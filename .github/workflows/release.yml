name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUST_TOOLCHAIN: stable

jobs:
  create-release:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-bump
        run: cargo install cargo-bump --locked

      - name: Bump version
        id: bump
        run: |
          cargo bump ${{ github.event.inputs.bump_type }}
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Bump version to v${VERSION}"
          git push

      - name: Create tag
        run: |
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: claudeboard
            asset_name: claudeboard-${{ needs.create-release.outputs.version }}-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: claudeboard
            asset_name: claudeboard-${{ needs.create-release.outputs.version }}-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: claudeboard
            asset_name: claudeboard-${{ needs.create-release.outputs.version }}-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: claudeboard
            asset_name: claudeboard-${{ needs.create-release.outputs.version }}-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: claudeboard.exe
            asset_name: claudeboard-${{ needs.create-release.outputs.version }}-windows-x86_64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.create-release.outputs.version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          else
            tar czf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          fi
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  upload-release:
    name: Upload Release Assets
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          name: Release v${{ needs.create-release.outputs.version }}
          draft: false
          prerelease: false
          files: artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
